name: Resource Report

on:
  issues:
    types: [labeled]

jobs:
  resource-report:
    if: github.event.label.name == 'resource report'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up MCP config
        run: |
          mkdir -p /tmp/mcp
          cat > /tmp/mcp/config.json << 'EOF'
          {
            "mcpServers": {
              "iam-policy-autopilot": {
                "command": "npx",
                "args": ["-y", "iam-policy-autopilot-mcp"]
              }
            }
          }
          EOF

      - name: Copy prompt
        run: cp .github/resource-report/prompt.md /tmp/mcp/prompt.md

      - name: Run Claude Code
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt_file: /tmp/mcp/prompt.md
          mcp_config: /tmp/mcp/config.json
          allowed_tools: >-
            Read,Write,Edit,
            Bash(find:*),Bash(ls:*),Bash(cat:*),Bash(mkdir:*),Bash(grep:*),Bash(docker:*),Bash(wc:*),Bash(head:*),Bash(tail:*),
            mcp__iam-policy-autopilot__generate_application_policies
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: "false"
          claude_env: |
            ISSUE_NUMBER: ${{ github.event.issue.number }}
            ISSUE_BODY: ${{ toJson(github.event.issue.body) }}
            REPO_NAME: ${{ github.event.repository.name }}
            AWS_REGION: ap-northeast-2

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resource-report-${{ github.event.issue.number }}
          path: /tmp/report/
          retention-days: 30

      - name: Post report to Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = '/tmp/report/summary.md';

            let body = '## 🤖 Resource Report\n\n';

            if (fs.existsSync(path)) {
              body += fs.readFileSync(path, 'utf8');
            } else {
              body += '> ⚠️ 리포트 생성에 실패했습니다. Action 로그를 확인해주세요.';
            }

            body += '\n\n---\n> 📎 전체 manifest 및 IAM 정책은 Action Artifacts에서 다운로드할 수 있습니다.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: body
            });
