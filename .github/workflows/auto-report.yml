name: Resource Report Generator

on:
  issues:
    types: [labeled]

jobs:
  generate-resource-report:
    if: github.event.label.name == 'resource report'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write # AWS OIDC 인증에 필요

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── AWS 인증 (OIDC) ──────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-2' }}

      # ── uv 설치 (awslabs MCP 서버가 uvx로 실행됨) ────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # ── MCP config 파일 생성 ─────────────────────────────────────────
      # Claude Code CLI가 --mcp-config를 받아서
      # uvx awslabs.aws-api-mcp-server를 child process로 spawn.
      # READ_OPERATIONS_ONLY=true로 읽기 전용 보장.
      - name: Write MCP config
        run: |
          mkdir -p /tmp/mcp
          cat > /tmp/mcp/config.json << 'EOF'
          {
            "mcpServers": {
              "aws-api": {
                "command": "uvx",
                "args": ["awslabs.aws-api-mcp-server@latest"],
                "env": {
                  "AWS_REGION": "${{ vars.AWS_REGION || 'ap-northeast-2' }}",
                  "READ_OPERATIONS_ONLY": "true",
                  "FASTMCP_LOG_LEVEL": "ERROR"
                }
              }
            }
          }
          EOF

      # ── 프롬프트 파일 생성 ───────────────────────────────────────────
      - name: Write analysis prompt
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
        run: |
          mkdir -p /tmp/mcp
          cat > /tmp/mcp/prompt.md << PROMPT
          # Resource Report 생성 요청

          ## 컨텍스트
          - 레포지토리: ${REPO}
          - 이슈 번호: #${ISSUE_NUMBER}
          - 이슈 제목: ${ISSUE_TITLE}
          - AWS 리전: ${AWS_REGION}

          ## 이슈 내용
          ${ISSUE_BODY}

          ## 작업 지시

          아래 단계를 순서대로 수행하세요.

          ### Step 1: 코드베이스 분석
          레포지토리의 모든 소스 파일을 읽고 아래를 파악하세요:
          - 사용 중인 AWS 서비스 (S3, RDS, SQS, ECR, ECS, EKS, Lambda, CloudWatch 등)
          - Kubernetes/EKS 관련 설정 (Deployment, ServiceAccount, VirtualService 등)
          - 환경 변수, ARN, 버킷명, 클러스터명 등 리소스 식별자
          - Docker/컨테이너 이미지 레지스트리 참조
          - IAM 관련 어노테이션 (eks.amazonaws.com/role-arn 등)

          ### Step 2: AWS 실제 리소스 조회
          aws-api MCP 서버를 사용해 현재 AWS 계정의 실제 리소스를 조회하세요.
          코드에서 발견한 서비스에 맞춰 아래 중 해당하는 것을 조회하세요:
          - S3 버킷 목록 및 정책
          - ECR 레포지토리 목록
          - EKS 클러스터 및 노드그룹
          - IAM 역할 및 연결된 정책
          - RDS 인스턴스, ElastiCache 클러스터
          - SQS 큐, SNS 토픽
          - CloudWatch 로그 그룹

          코드에서 발견한 리소스명/ARN과 실제 AWS 리소스를 매핑하세요.

          ### Step 3: docs/resources/ 디렉터리에 파일 3개 생성

          **파일 1: docs/resources/iam-policy.json**
          최소 권한 원칙(Least Privilege)을 적용한 IAM 정책.
          - 코드에서 실제로 사용하는 액션만 포함
          - 실제 AWS 조회로 확인할 수 있더라도 보안에 문제가 있다면 반드시 플레이스홀더 사용
          - 확인되지 않은 리소스는 <ACCOUNT_ID>, <REGION> 등 플레이스홀더 사용
          - Statement별로 Sid와 설명적인 이름 부여

          형식 예시:
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "AllowECRPull",
                "Effect": "Allow",
                "Action": ["ecr:GetAuthorizationToken", "ecr:BatchGetImage", "ecr:GetDownloadUrlForLayer"],
                "Resource": "arn:aws:ecr:ap-northeast-2:<ACCOUNT_ID>:repository/<REPO_NAME>"
              }
            ]
          }

          **파일 2: docs/resources/k8s-resources.yaml**
          Kubernetes 리소스 매니페스트. 코드에서 파악한 내용 기반으로:
          - Deployment (replicas, resources.requests/limits, probes, env 포함)
          - ServiceAccount (IRSA 어노테이션 포함)
          - Service
          - VirtualService (Istio 사용 시)
          실제 AWS 조회 결과로 확인된 값은 정확하게, 나머지는 플레이스홀더.

          형식 예시 (아래 구조를 그대로 따를 것):
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: <APP_NAME>
            labels:
              app: <APP_NAME>
            namespace: <NAMESPACE>
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: <APP_NAME>
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxSurge: 25%
                maxUnavailable: 25%
            revisionHistoryLimit: 4
            template:
              metadata:
                labels:
                  app: <APP_NAME>
              spec:
                serviceAccountName: <SERVICE_ACCOUNT_NAME>
                nodeSelector:
                  kubernetes.io/arch: arm64
                  phase: prod
                tolerations:
                  - effect: NoSchedule
                    key: phase
                    operator: Equal
                    value: prod
                containers:
                  - image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/<ECR_REPO>:<IMAGE_TAG>
                    name: <APP_NAME>
                    env:
                      - name: <ENV_KEY>
                        value: "<ENV_VALUE>"
                    resources:
                      requests:
                        cpu: <CPU_REQUEST>
                        memory: <MEMORY_REQUEST>
                      limits:
                        cpu: <CPU_LIMIT>
                        memory: <MEMORY_LIMIT>
                    ports:
                      - containerPort: <PORT>
                    startupProbe:
                      httpGet:
                        path: <STARTUP_PROBE_PATH>
                        port: <PORT>
                      initialDelaySeconds: 10
                      failureThreshold: 20
                    livenessProbe:
                      httpGet:
                        path: <LIVENESS_PROBE_PATH>
                        port: <PORT>
                    readinessProbe:
                      httpGet:
                        path: <READINESS_PROBE_PATH>
                        port: <PORT>
          ---
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: <SERVICE_ACCOUNT_NAME>
            namespace: <NAMESPACE>
            annotations:
              eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/<IAM_ROLE_NAME>
          ---
          apiVersion: v1
          kind: Service
          metadata:
            namespace: <NAMESPACE>
            name: <APP_NAME>
          spec:
            type: ClusterIP
            selector:
              app: <APP_NAME>
            ports:
              - port: 80
                targetPort: <PORT>
          ---
          apiVersion: networking.istio.io/v1alpha3
          kind: VirtualService
          metadata:
            namespace: <NAMESPACE>
            name: <APP_NAME>
          spec:
            gateways:
              - <ISTIO_GATEWAY>
              - mesh
            hosts:
              - <API_HOSTNAME>
            http:
              - route:
                  - destination:
                      host: <APP_NAME>

          **파일 3: docs/resources/RESOURCES.md**
          한국어로 작성하는 리소스 요약 문서. 아래를 포함:
          - 프로젝트 개요 (어떤 AWS 서비스를 쓰는지)
          - IAM 정책 설명 (각 Statement가 왜 필요한지)
          - Kubernetes 리소스 설명
          - 실제 AWS 조회로 확인된 리소스 목록
          - 적용 전 수동 확인이 필요한 항목 체크리스트
          - 생성 일시 및 트리거 이슈 번호

          ### Step 4: 완료 확인
          생성한 파일 3개의 경로를 출력하고 각 파일의 주요 내용을 요약하세요.
          PROMPT

      # ── Claude Code + AWS MCP 실행 ───────────────────────────────────
      # claude-code-base-action@beta: mcp_config 파라미터 지원
      # aws-api MCP 서버가 OIDC로 발급된 AWS 자격증명을 환경변수에서 자동 상속
      - name: Run Claude Code with AWS MCP
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt_file: /tmp/mcp/prompt.md
          mcp_config: /tmp/mcp/config.json
          allowed_tools: >-
            Read,Write,Edit,
            Bash(find:*),Bash(ls:*),Bash(cat:*),Bash(mkdir:*),
            mcp__aws-api__call_aws,mcp__aws-api__suggest_aws_commands
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: "false"
          claude_env: |
            ISSUE_NUMBER: ${{ github.event.issue.number }}
            AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}

      # ── 브랜치 생성 및 PR ────────────────────────────────────────────
      - name: Commit and create PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH="resource-report/issue-${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          if [ -n "$(git status --porcelain docs/resources/)" ]; then
            git add docs/resources/
            git commit -m "feat: resource report for issue #${ISSUE_NUMBER}

          Auto-generated IAM policy and Kubernetes resource files.
          Analyzed with AWS MCP (awslabs.aws-api-mcp-server).
          Triggered by: #${ISSUE_NUMBER} ${ISSUE_TITLE}

          Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push origin "$BRANCH" --force-with-lease

            cat > /tmp/pr_body.md << EOF
          ## 🔍 Resource Report — Issue #${ISSUE_NUMBER}

          > **${ISSUE_TITLE}**

          코드베이스 분석 + AWS 실제 리소스 조회를 기반으로 자동 생성된 리소스 리포트입니다.

          ### 📦 생성된 파일

          | 파일 | 설명 |
          |------|------|
          | \`docs/resources/iam-policy.json\` | IAM 권한 정책 (최소 권한 원칙) |
          | \`docs/resources/k8s-resources.yaml\` | Kubernetes 리소스 매니페스트 |
          | \`docs/resources/RESOURCES.md\` | 리소스 전체 요약 문서 (한국어) |

          ### 🔧 분석 방법
          - **코드 분석**: 소스 파일에서 AWS 서비스 사용 패턴 추출
          - **AWS MCP 조회**: \`awslabs.aws-api-mcp-server\`로 실제 계정 리소스 확인
          - 확인된 리소스는 정확한 ARN, 미확인은 \`<PLACEHOLDER>\` 표기

          ### ⚠️ 적용 전 필수 확인
          - [ ] IAM 정책의 플레이스홀더를 실제 값으로 교체
          - [ ] Kubernetes 이미지 태그 및 리소스 요청값 검토
          - [ ] 보안팀 리뷰

          Closes #${ISSUE_NUMBER}
          EOF

            gh pr create \
              --title "feat: resource report for issue #${ISSUE_NUMBER}" \
              --body-file /tmp/pr_body.md \
              --base main \
              --head "$BRANCH"

            echo "pr_created=true" >> $GITHUB_OUTPUT
          else
            echo "pr_created=false" >> $GITHUB_OUTPUT
          fi

      # ── 이슈에 결과 코멘트 ──────────────────────────────────────────
      - name: Comment on issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "${{ steps.pr.outputs.pr_created }}" == "true" ]; then
            gh issue comment "${ISSUE_NUMBER}" --body "✅ **Resource Report 생성 완료**

          \`awslabs.aws-api-mcp-server\`를 통해 실제 AWS 리소스를 조회하고 분석했습니다.

          생성된 파일:
          - \`docs/resources/iam-policy.json\`
          - \`docs/resources/k8s-resources.yaml\`
          - \`docs/resources/RESOURCES.md\`

          PR 브랜치: \`resource-report/issue-${ISSUE_NUMBER}\`"
          else
            gh issue comment "${ISSUE_NUMBER}" --body "⚠️ **Resource Report 생성 실패**

          워크플로우가 실행되었지만 파일이 생성되지 않았습니다.
          [Actions 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})를 확인해주세요."
          fi
