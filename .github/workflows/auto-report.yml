name: Resource Report

on:
  issues:
    types: [labeled]

jobs:
  resource-report:
    if: github.event.label.name == 'resource report'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up MCP config
        run: |
          mkdir -p /tmp/mcp
          cat > /tmp/mcp/config.json << 'EOF'
          {
            "mcpServers": {
                "iam-policy-autopilot": {
                  "command": "uvx",
                  "args": ["iam-policy-autopilot", "mcp-server"],
                  "env": {
                    "AWS_REGION": "ap-northeast-2"
                  }
                }
            }
          }
          EOF

      - name: Copy prompt
        run: cp .github/resource-report/prompt.md /tmp/mcp/prompt.md

      - name: Run Claude Code
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt_file: /tmp/mcp/prompt.md
          mcp_config: /tmp/mcp/config.json
          allowed_tools: >-
            Read,Write,Edit,
            Bash(find:*),Bash(ls:*),Bash(cat:*),Bash(mkdir:*),Bash(grep:*),Bash(docker:*),Bash(wc:*),Bash(head:*),Bash(tail:*),
            mcp__iam-policy-autopilot__generate_application_policies
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: "false"
          claude_env: |
            ISSUE_NUMBER: ${{ github.event.issue.number }}
            ISSUE_BODY: ${{ toJson(github.event.issue.body) }}
            REPO_NAME: ${{ github.event.repository.name }}
            AWS_REGION: ap-northeast-2

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resource-report-${{ github.event.issue.number }}
          path: /tmp/report/
          retention-days: 30

      - name: Commit report to branch and create PR
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          BRANCH="resource-report/issue-${ISSUE_NUMBER}"
          REPORT_DIR="/tmp/report"
          DEST="resource-reports/issue-${ISSUE_NUMBER}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"

          mkdir -p "${DEST}"
          cp "${REPORT_DIR}"/* "${DEST}/"

          git add "${DEST}"
          git commit -m "chore: add resource report for issue #${ISSUE_NUMBER}"
          git push origin "${BRANCH}" --force-with-lease

          SUMMARY=$(cat "${REPORT_DIR}/summary.md" 2>/dev/null || echo "리포트 파일을 참고하세요.")
          FILES=$(ls "${DEST}" | sed "s|^|- \`${DEST}/|; s|$|\`|")

          PR_BODY="## Resource Report — Issue #${ISSUE_NUMBER}
          
            > 이 PR은 자동 생성되었습니다. 아래 항목을 직접 채워 넣은 뒤 머지하세요.
          
            ${SUMMARY}
          
          ---
          ### 포함된 파일
            ${FILES}"
          
          PR_URL=$(gh pr create \
          --title "[Resource Report] Issue #${ISSUE_NUMBER} — ${{ github.event.repository.name }}" \
          --body "${PR_BODY}" \
          --base "${{ github.event.repository.default_branch }}" \
          --head "${BRANCH}" \
          --draft)
          
          echo "pr-url=${PR_URL}" >> $GITHUB_OUTPUT

      - name: Post comment to Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          PR_URL="${{ steps.create-pr.outputs.pr-url }}"
          SUMMARY=$(cat /tmp/report/summary.md 2>/dev/null || echo "⚠️ 요약 파일을 찾을 수 없습니다. Action 로그를 확인해주세요.")
          
          COMMENT_BODY="## 🤖 Resource Report 생성 완료
          
            ${SUMMARY}
          
          ---
          ### 📎 생성된 PR
            ${PR_URL}
            
            > PR은 **Draft** 상태입니다. \`<PLACEHOLDER>\` 항목을 채운 뒤 Ready for review로 변경해주세요."
            
            gh issue comment "${ISSUE_NUMBER}" \
              --repo "${{ github.repository }}" \
              --body "${COMMENT_BODY}"
